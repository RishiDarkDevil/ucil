[workspace]
resolver = "2"
members = [
    "crates/ucil-core",
    "crates/ucil-daemon",
    "crates/ucil-cli",
    "crates/ucil-treesitter",
    "crates/ucil-lsp-diagnostics",
    "crates/ucil-agents",
    "crates/ucil-embeddings",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["RishiDarkDevil <rishi8001100192@gmail.com>"]
license = "MIT"
repository = "https://github.com/RishiDarkDevil/ucil"

[workspace.dependencies]
# Error handling
thiserror = "2"
anyhow = "1"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Serialisation
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Embedded SQLite (bundled = static link, no system libsqlite3 required)
rusqlite = { version = "0.31", features = ["bundled"] }

# OpenTelemetry — stdout-only exporter for Phase 0 (invariant 8)
opentelemetry = { version = "0.27", features = ["trace"] }
opentelemetry_sdk = { version = "0.27", features = ["trace"] }
opentelemetry-stdout = { version = "0.27", features = ["trace"] }

# CLI argument parsing
clap = { version = "4", features = ["derive"] }

# TOML serialization for ucil.toml
toml = "0.8"

# Test helpers
tempfile = "3"

# tree-sitter — multi-language parser (Phase 1 Week 2)
# Grammar crates at 0.23–0.25 use grammar ABI version 15 which requires
# tree-sitter >= 0.25 (0.24.x only supports up to ABI 14).
tree-sitter = "0.25"
tree-sitter-rust = "0.24"
tree-sitter-python = "0.25"
tree-sitter-typescript = "0.23"
tree-sitter-javascript = "0.25"
tree-sitter-go = "0.25"
tree-sitter-java = "0.23"
tree-sitter-c = "0.24"
tree-sitter-cpp = "0.23"
tree-sitter-ruby = "0.23"
tree-sitter-bash = "0.25"
tree-sitter-json = "0.24"

# Unique IDs for session manager
uuid = { version = "1", features = ["v4", "serde"] }

# Recursive filesystem walker for plugin discovery (Phase 1 Week 5)
walkdir = "2"

# LSP community types (LSP 3.17 wire structs) — used by
# `ucil-lsp-diagnostics::diagnostics` for `Diagnostic`,
# `CallHierarchyItem`, `CallHierarchyIncomingCall`,
# `CallHierarchyOutgoingCall`, and `TypeHierarchyItem` so UCIL does not
# hand-roll LSP wire types.  Introduced in Phase 1 Week 5 (WO-0015).
lsp-types = "0.95"

# Object-safe async trait macro — used by the `SerenaClient` trait in
# `ucil-lsp-diagnostics` so the bridge can hold an
# `Arc<dyn SerenaClient + Send + Sync>` across `.await` points.
async-trait = "0.1"

[profile.dev]
opt-level = 0

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
