[workspace]
resolver = "2"
members = [
    "crates/ucil-core",
    "crates/ucil-daemon",
    "crates/ucil-cli",
    "crates/ucil-treesitter",
    "crates/ucil-lsp-diagnostics",
    "crates/ucil-agents",
    "crates/ucil-embeddings",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["RishiDarkDevil <rishi8001100192@gmail.com>"]
license = "MIT"
repository = "https://github.com/RishiDarkDevil/ucil"

[workspace.dependencies]
# Error handling
thiserror = "2"
anyhow = "1"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.dev]
opt-level = 0

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
