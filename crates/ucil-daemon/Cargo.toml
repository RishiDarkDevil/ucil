[package]
name = "ucil-daemon"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "UCIL daemon binary: file watcher, plugin manager, query router, session manager"

[[bin]]
name = "ucil-daemon"
path = "src/main.rs"

# Mock MCP plugin used by the plugin-manager integration tests. Lives
# under tests/support/ so it is co-located with its only consumer.
# Integration tests reach it via `env!("CARGO_BIN_EXE_mock-mcp-plugin")`.
[[bin]]
name = "mock-mcp-plugin"
path = "tests/support/mock_mcp_plugin.rs"

[dependencies]
anyhow.workspace = true
thiserror.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
uuid.workspace = true
ucil-core = { path = "../ucil-core" }

[dev-dependencies]
tempfile.workspace = true
