# Repomix MCP plugin manifest (master-plan §14.1 category = "context").
#
# pinned 2026-05-08: repomix v1.14.0 (yamadashy/repomix)
#   source          : https://github.com/yamadashy/repomix
#   npm package     : https://www.npmjs.com/package/repomix
#   pinned tag      : 1.14.0 — npm `latest` published by Kazuki
#                     Yamada (MIT license; canonical Node MCP server
#                     for the repository-pack feature). The CLI binary
#                     also runs as a one-shot codebase packer outside
#                     MCP mode; the `--mcp` flag switches the binary
#                     into stdio JSON-RPC mode.
#   binary launch   : `npx -y repomix@1.14.0 --mcp` — `npx`
#                     downloads + caches the npm package and runs the
#                     `repomix` console-script entry-point with the
#                     `--mcp` switch that drops it into stdio JSON-RPC
#                     server mode (without the switch the binary is a
#                     plain CLI packer, NOT an MCP server).
#   advertised tools: pack_codebase, pack_remote_repository,
#                     generate_skill, attach_packed_output,
#                     read_repomix_output, grep_repomix_output,
#                     file_system_read_file, file_system_read_directory
#                     (8 total — verified end-to-end via
#                     PluginManager::health_check; see
#                     crates/ucil-daemon/tests/g5_plugin_manifests.rs).
#                     Master-plan §3.1 line 311 + §4.5 line 344 refer
#                     to a "pack_codebase" surface as the canonical
#                     repo-to-context tool; the upstream literal
#                     `pack_codebase` (snake_case, NOT the kebab-case
#                     emitted by Context7) matches verbatim.
#   transport       : stdio (master-plan §13; no HTTP in Phase 3).
#   API keys        : NONE — Repomix is local-only. `pack_codebase`
#                     against a local path performs zero network
#                     calls; `pack_remote_repository` clones over
#                     HTTPS using the local git binary but does not
#                     require an API key for public GitHub repos.
#                     The token-reduction the F03 spec measures is a
#                     deterministic local computation (Tree-sitter +
#                     gitignore-aware filter + dedup), reproducible
#                     across CI runs against tests/fixtures/rust-project.
#
# G5 Context source per master-plan §5.5 — Repomix is the
# repository-packing half of the G5 group; Context7 is the
# documentation-lookup half (see plugins/context/context7/plugin.toml).
# Where Context7 reaches outward to context7.com for live library
# docs, Repomix walks inward across the working tree to consolidate
# the active codebase into a single token-efficient context blob the
# agent can consume in one read. Master-plan §3.1 line 311 + §4.5
# line 344 mark Repomix as P0 priority — the canonical second G5
# plugin to land alongside Context7. Future G5 entries (Aider repo-map
# Rust reimplementation; future doc-mirror sources) extend the
# context.* namespace.
#
# Reproducibility: a moving `latest` dist-tag is deliberately avoided
# per .claude/rules/commit-style.md. The npm package version is
# pinned to an immutable release tag so the manifest produces
# byte-identical health checks across CI machines and operator
# workstations. When upstream cuts a v2.x with breaking tool-surface
# changes, supersede this manifest in a new ADR and bump the pin.

[plugin]
name = "repomix"
category = "context"
priority = "P0"
version = "1.14.0"
description = "AI-optimized repository packing with Tree-sitter compression. MIT license. G5 source per master-plan §3.1 line 311 + §4.5 line 344 + §5.5."

[capabilities]
provides = [
    "context.repo_pack.pack_codebase",
    "context.repo_pack.pack_remote_repository",
    "context.repo_pack.read_repomix_output",
]
languages = []

[transport]
type = "stdio"
command = "npx"
args = [
    "-y",
    "repomix@1.14.0",
    "--mcp",
]

[lifecycle]
hot_cold = true
idle_timeout_minutes = 10
