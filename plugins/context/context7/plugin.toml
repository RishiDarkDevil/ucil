# Context7 MCP plugin manifest (master-plan §14.1 category = "context").
#
# pinned 2026-05-08: @upstash/context7-mcp v2.2.4 (upstash/context7)
#   source          : https://github.com/upstash/context7
#   npm package     : https://www.npmjs.com/package/@upstash/context7-mcp
#   pinned tag      : 2.2.4 — npm `latest` published by Upstash team
#                     (MIT license; canonical Node MCP server for the
#                     library-docs lookup feature). The `canary` dist-tag
#                     (e.g. 2.1.0-canary-20260108172005) is deliberately
#                     NOT consumed: only immutable release tags get
#                     pinned per .claude/rules/commit-style.md.
#   binary launch   : `npx -y @upstash/context7-mcp@2.2.4` — `npx`
#                     downloads + caches the npm package and runs the
#                     `context7-mcp` console-script entry-point. The
#                     server speaks JSON-RPC 2.0 over stdio. No
#                     `--mcp` / `mcp start` subcommand needed (unlike
#                     codegraphcontext): the binary IS the MCP server.
#   advertised tools: resolve-library-id, query-docs
#                     (2 total — verified end-to-end via
#                     PluginManager::health_check; see
#                     crates/ucil-daemon/tests/g5_plugin_manifests.rs).
#                     Master-plan §3.1 line 311 + §4.5 line 343 refer
#                     to a "get_library_docs" / "get-library-docs"
#                     surface; the upstream v2.2.x rename to
#                     `query-docs` is captured here verbatim. Capability
#                     name preserves the master-plan vocabulary
#                     (`context.docs.query_docs`) so consumers can
#                     reason about the surface independently of the
#                     upstream literal — the test pin is on
#                     `resolve-library-id` (the disambiguation surface
#                     least likely to drift since it is the documented
#                     entry point in the upstream README).
#   transport       : stdio (master-plan §13; no HTTP in Phase 3).
#   API keys        : NONE required for `tools/list` round-trips. The
#                     `resolve-library-id` and `query-docs` tools
#                     reach context7.com over HTTPS for free-tier reads;
#                     no API key needed for default rate-limited
#                     queries (operators may set `CONTEXT7_API_KEY`
#                     for higher-tier quota — that is operator-state
#                     and OUT OF SCOPE for this manifest).
#
# Establishing the `context.*` capability namespace: parallel to
# `search.*` (probe; P2-W6-F06), `navigate.*` (scip; P2-W7-F08),
# `knowledge.*` (codebase-memory; P3-W9-F05 + mem0; P3-W9-F06), and
# `architecture.*` (codegraphcontext; P3-W9-F08). G5 Context sources
# advertise capabilities under the `context.*` prefix; Context7 is the
# documentation-lookup half and Repomix is the repo-pack half (see
# plugins/context/repomix/plugin.toml).
#
# G5 Context source per master-plan §5.5 — the G5 group queries all
# context stores in parallel and the agent synthesizes a unified context
# packet for the active task. Context7 sits at master-plan §3.1 line 311
# + §4.5 line 343 as P0 priority — the canonical first G5 plugin to
# land. Future G5 entries (Aider repo-map, future doc-lookup mirrors)
# extend the context.* namespace.
#
# Reproducibility: a moving `latest` or `canary` dist-tag is deliberately
# avoided per .claude/rules/commit-style.md. The npm package version is
# pinned to an immutable release tag so the manifest produces
# byte-identical health checks across CI machines and operator
# workstations. When upstream cuts a v3.x with breaking tool-surface
# changes, supersede this manifest in a new ADR and bump the pin.

[plugin]
name = "context7"
category = "context"
priority = "P0"
version = "2.2.4"
description = "Live library documentation lookup. MIT license. G5 source per master-plan §3.1 line 311 + §4.5 line 343 + §5.5."

[capabilities]
provides = [
    "context.docs.resolve_library_id",
    "context.docs.query_docs",
]
languages = []

[transport]
type = "stdio"
command = "npx"
args = [
    "-y",
    "@upstash/context7-mcp@2.2.4",
]

[lifecycle]
hot_cold = true
idle_timeout_minutes = 10
